<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="100%" height="100%">
  <defs>
    <!-- Modern harmony gradient for branding -->
    <linearGradient id="brandGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488" /> <!-- Teal 600 -->
      <stop offset="100%" stop-color="#10b981" /> <!-- Emerald 500 -->
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" /> <!-- Slate 800 -->
      <stop offset="100%" stop-color="#0f172a" /> <!-- Slate 900 -->
    </linearGradient>
    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Vector Graphic Icon -->
  <g transform="translate(10, 10)">
    <!-- House Roof / Top Chevron representing shelter -->
    <path d="M 40 10 L 70 35 L 58 35 L 40 20 L 22 35 L 10 35 Z" fill="url(#brandGradient)" filter="url(#subtleShadow)" />
    <!-- Secondary overlapping chevron representing growth & stairs -->
    <path d="M 40 28 L 58 43 L 48 43 L 40 36 L 32 43 L 22 43 Z" fill="#06b6d4" opacity="0.85" />
    <!-- Keyhole/Door silhouette in gold representing key to new home -->
    <path d="M 36 55 L 44 55 L 44 70 L 36 70 Z" fill="#eab308" />
    <!-- House Columns/Foundation -->
    <path d="M 18 48 L 24 48 L 24 75 L 18 75 Z" fill="url(#brandGradient)" />
    <path d="M 56 48 L 62 48 L 62 75 L 56 75 Z" fill="url(#brandGradient)" />
    <path d="M 12 78 L 68 78 L 68 83 L 12 83 Z" fill="url(#brandGradient)" />
  </g>

  <!-- Vector Branding Typography -->
  <g transform="translate(100, 58)">
    <text font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="34" fill="#0f172a">
      <tspan fill="#0f172a" class="theme-text-dark">Makao</tspan>
      <tspan fill="url(#brandGradient)">Realtors</tspan>
    </text>
    <text font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#64748b" letter-spacing="4" y="20" x="2">
      KENYAN HOUSING BROKER
    </text>
  </g>
</svg>
